<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KERIN — Lagos Frequency</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

<style>
:root{
  --sky:#F6E7C1;
  --sand:#E7D3B0;
  --rust:#D06B3D;
  --teal:#1F6F78;
  --coral:#FF5C7A;
  --indigo:#1B1C2A;
}

/* BASE */
body{
  margin:0;
  font-family:Syne;
  background:linear-gradient(180deg,var(--sky),var(--sand));
  overflow-x:hidden;
  color:#1a1a1a;
}

/* PAINT BACKGROUND LAYER */
.paint-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.blob{
  position:absolute;
  width:300px;
  height:300px;
  border-radius:50%;
  filter:blur(80px);
  opacity:.35;
  animation:float 12s infinite ease-in-out;
}

.blob:nth-child(1){background:var(--rust);top:10%;left:10%}
.blob:nth-child(2){background:var(--teal);top:60%;left:70%}
.blob:nth-child(3){background:var(--coral);top:40%;left:40%}
.blob:nth-child(4){background:#FFD166;top:80%;left:20%}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-40px)}
}

/* HERO */
#hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  z-index:2;
}

h1{
  font-size:clamp(60px,10vw,140px);
  letter-spacing:10px;
  margin:0;
}

/* 3D CTA BUTTONS */
.cta-row{
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:25px;
}

.btn{
  position:relative;
  padding:14px 26px;
  border-radius:40px;
  cursor:pointer;
  transform-style:preserve-3d;
  transition:.2s;
  font-weight:700;
  user-select:none;
}

/* depth shadow layer */
.btn::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:40px;
  transform:translateZ(-10px);
  filter:blur(10px);
  opacity:.4;
}

.primary{
  background:var(--rust);
  color:white;
  box-shadow:0 12px 30px rgba(208,107,61,.35);
}

.secondary{
  border:2px solid var(--teal);
  background:rgba(255,255,255,.4);
  backdrop-filter:blur(10px);
  color:var(--teal);
}

/* SCRAPBOOK */
.scrapbook{
  columns:3 250px;
  column-gap:15px;
  padding:120px 10vw;
  position:relative;
  z-index:2;
}

.scrap{
  break-inside:avoid;
  margin-bottom:15px;
  border-radius:18px;
  overflow:hidden;
  transform:translateY(40px);
  opacity:0;
  position:relative;
}

.scrap img{
  width:100%;
  display:block;
}

/* UPLOAD AREA */
.upload-box{
  margin:0 10vw 40px;
  padding:20px;
  border:2px dashed var(--teal);
  border-radius:20px;
  text-align:center;
  background:rgba(255,255,255,.3);
  backdrop-filter:blur(10px);
}

/* EVENTS */
.events{
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding:0 10vw 100px;
}

.event{
  min-width:240px;
  height:150px;
  background:rgba(255,255,255,.4);
  backdrop-filter:blur(10px);
  border-radius:18px;
  padding:15px;
}

/* NEWSLETTER */
.newsletter{
  padding:100px 10vw;
  text-align:center;
}

.input{
  width:320px;
  padding:14px;
  border-radius:40px;
  border:2px solid var(--teal);
  outline:none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .scrapbook{columns:1}
  .cta-row{flex-direction:column}
}
</style>
</head>

<body>

<!-- PAINT BACKGROUND -->
<div class="paint-layer">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<!-- HERO -->
<section id="hero">
  <div>
    <h1>KERIN</h1>
    <p>Lagos Frequency · Afrofusion Identity</p>

    <div class="cta-row">
      <div class="btn primary">🎵 Pre-Save Now</div>
      <div class="btn secondary">🎬 Watch Visuals</div>
    </div>
  </div>
</section>

<!-- SCRAPBOOK UPLOAD -->
<section>

<div class="upload-box">
  <p><b>Upload Scrapbook Images</b></p>
  <input type="file" id="fileInput" multiple accept="image/*">
</div>

<div class="scrapbook" id="scrapbook"></div>

</section>

<!-- EVENTS -->
<section>
  <h2 style="text-align:center">UPCOMING</h2>

  <div class="events">
    <div class="event">Lagos Live</div>
    <div class="event">Accra Night Set</div>
    <div class="event">London Pop-up</div>
  </div>
</section>

<!-- NEWSLETTER -->
<section class="newsletter">
  <h2>Subscribe for Lagos Frequency</h2>
  <input class="input" placeholder="Enter email"/>
</section>

<script>

/* LENIS */
const lenis=new Lenis();
function raf(t){lenis.raf(t);requestAnimationFrame(raf)}
requestAnimationFrame(raf);

/* SCRAPBOOK UPLOAD SYSTEM */
const input=document.getElementById("fileInput");
const scrapbook=document.getElementById("scrapbook");

function addImage(src){
  const div=document.createElement("div");
  div.className="scrap";
  div.innerHTML=`<img src="${src}"/>`;
  scrapbook.appendChild(div);

  gsap.to(div,{
    opacity:1,
    y:0,
    duration:1
  });
}

input.addEventListener("change",(e)=>{
  const files=[...e.target.files];
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=()=>{
      addImage(reader.result);
    }
    reader.readAsDataURL(file);
  });
});

/* DEFAULT SAMPLE IMAGES */
for(let i=1;i<=6;i++){
  addImage(`https://picsum.photos/600/800?random=${i}`);
}

/* SCRAP ANIMATION */
gsap.utils.toArray(".scrap").forEach(el=>{
  gsap.to(el,{
    scrollTrigger:{
      trigger:el,
      start:"top 85%",
    },
    opacity:1,
    y:0,
    duration:1
  });
});

</script>

</body>
</html>
