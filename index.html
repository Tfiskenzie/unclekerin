<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KERIN — Lagos To The World</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>

<style>

:root{
  --bg:#070707;
  --text:#f5efe6;
  --gold:#ffb200;
  --coral:#ff5e4d;
  --border:rgba(255,255,255,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  overflow-x:hidden;
}

/* INTRO FIXED */
.intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99999;
  transition:opacity .8s ease, visibility .8s ease;
}

.intro.hide{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}

.intro-text{
  font-family:'Dela Gothic One';
  font-size:10vw;
  color:white;
  letter-spacing:.1em;
}

/* CURSOR */
.cursor{
  width:14px;height:14px;
  border:1px solid var(--gold);
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:80px;
  position:relative;
}

#scene{
  position:absolute;
  inset:0;
  z-index:0;
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:900px;
}

.hero h1{
  font-family:'Dela Gothic One';
  font-size:8vw;
  line-height:.9;
}

.hero p{
  margin-top:20px;
  opacity:.7;
}

.btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 24px;
  border:1px solid var(--gold);
  border-radius:999px;
  cursor:pointer;
}

.section{
  padding:120px 10vw;
}

.section h2{
  font-family:'Dela Gothic One';
  font-size:4vw;
  margin-bottom:40px;
}

/* TRACKS */
.track{
  padding:20px 0;
  border-bottom:1px solid var(--border);
}

/* EVENTS */
.event{
  padding:30px;
  border:1px solid var(--border);
  margin-bottom:20px;
  border-radius:20px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="intro-text">KERIN</div>
</div>

<div class="cursor"></div>

<!-- HERO -->
<section class="hero">

  <div id="scene"></div>

  <div class="hero-content">
    <h1>
      LAGOS<br>
      TO THE<br>
      WORLD
    </h1>

    <p>Afrofusion artist · New wave sound from Nigeria</p>

    <a class="btn">Pre-Save Now</a>
  </div>

</section>

<!-- MUSIC -->
<section class="section">
  <h2>Latest Drop</h2>

  <div class="track">01 — EKO NIGHTS</div>
  <div class="track">02 — SUNSET DRIVE</div>
  <div class="track">03 — NO SIGNAL</div>
</section>

<!-- EVENTS -->
<section class="section">
  <h2>Events</h2>

  <div class="event">Lagos — December 2026</div>
  <div class="event">London — January 2027</div>
  <div class="event">Houston — March 2027</div>

</section>

<script>

/* INTRO FIX */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelector('.intro').classList.add('hide');
  }, 1200);
});

/* CURSOR */
const cursor = document.querySelector('.cursor');

window.addEventListener('mousemove', (e) => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

/* LENIS SAFE INIT */
const lenis = new Lenis();
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* THREE.JS SAFE INIT */
let scene, camera, renderer, mesh;

function init3D(){

  const container = document.getElementById('scene');

  if(!container) return;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  renderer = new THREE.WebGLRenderer({alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  const geometry = new THREE.TorusGeometry(2,0.4,16,100);
  const material = new THREE.MeshStandardMaterial({color:0xffb200});
  mesh = new THREE.Mesh(geometry, material);

  scene.add(mesh);

  const light = new THREE.PointLight(0xffb200,2);
  light.position.set(3,3,3);
  scene.add(light);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(mesh){
    mesh.rotation.x += 0.002;
    mesh.rotation.y += 0.003;
  }

  if(renderer){
    renderer.render(scene,camera);
  }
}

init3D();

/* RESIZE */
window.addEventListener('resize', () => {
  if(camera && renderer){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
});

</script>

</body>
</html>
