<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UNCLE K</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --sky:#F6E7C1;
  --sand:#E7D3B0;
  --rust:#D06B3D;
  --teal:#1F6F78;
  --coral:#FF5C7A;
}

body{
  margin:0;
  font-family:Syne;
  background:linear-gradient(180deg,var(--sky),var(--sand));
  overflow-x:hidden;
}

/* ===================== */
/* CINEMATIC OVERLAY */
/* ===================== */

#cinematicOverlay{
  position:fixed;
  inset:0;
  z-index:99999;
  pointer-events:none;
  opacity:0;
  background:radial-gradient(circle at center, rgba(255,255,255,.2), rgba(0,0,0,.85));
}

#cinematicOverlay.active{
  animation:flash .9s ease forwards;
}

@keyframes flash{
  0%{opacity:0;transform:scale(1.3);filter:blur(10px)}
  30%{opacity:1;transform:scale(1.1);filter:blur(0)}
  100%{opacity:0;transform:scale(1);filter:blur(8px)}
}

/* ===================== */
/* BACKGROUND */
/* ===================== */

.bg-theme{
  position:fixed;
  inset:0;
  z-index:-5;
  background-size:cover;
  background-position:center;
  opacity:.35;
  transition:1.2s ease;
}

/* ===================== */
/* TOGGLE */
/* ===================== */

.theme-toggle{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
}

.toggle-track{
  position:relative;
  display:flex;
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(12px);
  border-radius:50px;
  padding:6px;
  gap:6px;
}

.toggle-option{
  padding:10px 14px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border-radius:40px;
  opacity:.6;
  user-select:none;
}

.toggle-option.active{opacity:1}

.toggle-thumb{
  position:absolute;
  top:6px;
  left:6px;
  width:70px;
  height:32px;
  border-radius:40px;
  background:white;
  transition:.35s ease;
  z-index:-1;
}

/* ===================== */
/* HERO */
/* ===================== */

#hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1{
  font-size:clamp(60px,10vw,140px);
  letter-spacing:12px;
}

/* ===================== */
/* VINYL */
/* ===================== */

.vinyl-section{
  padding:100px 10vw;
  display:flex;
  justify-content:center;
}

.vinyl{
  width:240px;
  height:240px;
  border-radius:50%;
  background:#111;
  position:relative;
  cursor:pointer;
}

.vinyl.playing{
  animation:spin 2.5s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.record{
  position:absolute;
  inset:18px;
  border-radius:50%;
  background:repeating-radial-gradient(circle,#222 0,#111 3px,#000 6px);
}

.label{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:800;
}

/* waveform */
.waveform{
  display:flex;
  gap:3px;
  height:60px;
  align-items:flex-end;
}

.waveform span{
  width:4px;
  height:10px;
  background:var(--teal);
}

.waveform.playing span{
  animation:wave .8s infinite ease-in-out;
}

@keyframes wave{
  0%,100%{height:10px}
  50%{height:55px}
}

/* ===================== */
/* LETTER (UPDATED) */
/* ===================== */

.letter{
  padding:120px 10vw;
  text-align:center;
}

.letter-box{
  max-width:700px;
  margin:auto;
  background:rgba(255,255,255,.6);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(12px);

  font-family:"Caveat", cursive;
  font-size:26px;
  line-height:1.7;

  position:relative;
}

.letter-box h2{
  font-family:Syne;
  font-size:20px;
  letter-spacing:2px;
}

/* ===================== */
/* NEWSLETTER */
/* ===================== */

.newsletter{
  padding:100px 10vw;
  text-align:center;
}

.input{
  padding:14px;
  border-radius:40px;
  width:300px;
  border:1px solid #ccc;
}

/* FOOTER */
footer{
  padding:60px;
  background:#1B1C2A;
  display:flex;
  justify-content:center;
  gap:20px;
}

.icon{
  width:24px;
  height:24px;
  fill:white;
}
</style>
</head>

<body>

<!-- CINEMATIC -->
<div id="cinematicOverlay"></div>

<!-- BACKGROUND -->
<div class="bg-theme" id="bgTheme"></div>

<!-- TOGGLE -->
<div class="theme-toggle">
  <div class="toggle-track">
    <div class="toggle-thumb" id="thumb"></div>

    <div class="toggle-option active" data-theme="lagos-night">Night</div>
    <div class="toggle-option" data-theme="space">Space</div>
    <div class="toggle-option" data-theme="traffic">Traffic</div>
  </div>
</div>

<!-- HERO -->
<section id="hero">
  <h1>UNCLE K</h1>
</section>

<!-- AUDIO -->
<audio id="audio" src="yourz.mp3"></audio>

<!-- VINYL -->
<section class="vinyl-section">
  <div class="vinyl" id="vinyl">
    <div class="record"></div>
    <div class="label">PLAY</div>
  </div>

  <div class="waveform" id="waveform"></div>
</section>

<!-- LETTER -->
<section class="letter">
  <div class="letter-box">

    <img 
      src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21?q=80&w=1600&auto=format&fit=crop"
      style="width:100%;border-radius:16px;margin-bottom:20px;"
    />

    <h2>A LETTER FROM UNCLE K</h2>

    <p>Thank you for being part of this journey.</p>
    <p>Your trust means everything as this sound evolves.</p>
    <p>This is only the beginning.</p>

  </div>
</section>

<!-- NEWSLETTER -->
<section class="newsletter">
  <h2>Subscribe</h2>
  <input class="input" placeholder="Email"/>
</section>

<!-- FOOTER -->
<footer>
<svg class="icon" viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5z"/></svg>
<svg class="icon" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10"/></svg>
</footer>

<script>

const bg=document.getElementById("bgTheme");
const overlay=document.getElementById("cinematicOverlay");
const options=document.querySelectorAll(".toggle-option");
const thumb=document.getElementById("thumb");

/* cinematic */
function flash(){
  overlay.classList.remove("active");
  void overlay.offsetWidth;
  overlay.classList.add("active");
}

/* thumb move */
function move(i){
  thumb.style.transform=`translateX(${i*76}px)`;
}

/* theme */
function setTheme(type,i){

  flash();
  move(i);

  options.forEach(o=>o.classList.remove("active"));
  options[i].classList.add("active");

  setTimeout(()=>{

    if(type==="lagos-night"){
      bg.style.backgroundImage="url('https://images.unsplash.com/photo-1514565131-fce0801e5785')";
    }

    if(type==="space"){
      bg.style.backgroundImage="url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564')";
    }

    if(type==="traffic"){
      bg.style.backgroundImage="url('https://images.unsplash.com/photo-1509099836639-18ba1795216d')";
    }

  },200);
}

options.forEach((o,i)=>{
  o.onclick=()=>setTheme(o.dataset.theme,i);
});

setTheme("lagos-night",0);

/* VINYL */
const audio=document.getElementById("audio");
const vinyl=document.getElementById("vinyl");
const wave=document.getElementById("waveform");

for(let i=0;i<18;i++){
  const s=document.createElement("span");
  wave.appendChild(s);
}

let play=false;

vinyl.onclick=()=>{
  if(!play){
    audio.play();
    vinyl.classList.add("playing");
    wave.classList.add("playing");
  }else{
    audio.pause();
    vinyl.classList.remove("playing");
    wave.classList.remove("playing");
  }
  play=!play;
};

</script>

</body>
</html>
